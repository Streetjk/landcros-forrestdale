<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteNav — 3D Viewer</title>
  <script src="coi-serviceworker.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Importmap must come before any module scripts -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7?external=three"
    }
  }
  </script>

  <!-- GSAP (non-module, loads after importmap) -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <link rel="stylesheet" href="./style.css">
  <style>
    /* ── Design token overrides for dark glass theme ── */
    :root {
      --font: 'Inter', 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --panel-width: 360px;

      /* Dark glass palette */
      --surface:           rgba(8, 10, 16, 0.93);
      --surface-secondary: rgba(255, 255, 255, 0.05);
      --border:            rgba(255, 255, 255, 0.07);
      --text:              #eef0f4;
      --text-secondary:    rgba(238, 240, 244, 0.48);

      /* Accents */
      --primary:       #3b82f6;
      --primary-light: rgba(59, 130, 246, 0.15);
      --accent:        #10b981;
      --accent-light:  rgba(16, 185, 129, 0.15);
      --amber:         #f59e0b;
      --amber-light:   rgba(245, 158, 11, 0.15);
    }

    html, body {
      font-family: var(--font);
      color: var(--text);
      background: #080a10;
    }

    /* ── Scrollbar dark theme ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* ── Layout ── */
    #app { display: flex; width: 100%; height: 100%; background: #080a10; }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #three-canvas { display: block; width: 100%; height: 100%; }

    #labels-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Loading screen ── */
    #loading {
      position: absolute;
      inset: 0;
      background: #080a10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
      gap: 0;
    }
    #loading.done { opacity: 0; pointer-events: none; }

    .load-logo-mark {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.35);
    }
    .load-logo-mark svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .load-site-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #eef0f4;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .load-site-sub {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(238, 240, 244, 0.4);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .load-bar {
      width: 280px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .load-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      width: 0;
      transition: width 0.3s ease;
    }
    .load-msg {
      font-size: 11px;
      color: rgba(238, 240, 244, 0.35);
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }

    /* ── Camera preset buttons ── */
    #cam-presets {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    .cam-btn {
      background: rgba(8, 10, 16, 0.82) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: rgba(238, 240, 244, 0.8) !important;
      padding: 6px 14px !important;
      border-radius: 20px !important;
      font: 500 12px var(--font) !important;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: 0.02em;
    }
    .cam-btn:hover {
      background: rgba(59, 130, 246, 0.18) !important;
      border-color: rgba(59, 130, 246, 0.4) !important;
      color: #93c5fd !important;
    }
    .cam-btn.active {
      background: rgba(59, 130, 246, 0.25) !important;
      border-color: rgba(59, 130, 246, 0.5) !important;
      color: #93c5fd !important;
    }

    /* ── Nav progress bar ── */
    #nav-progress {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8, 10, 16, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 20px;
      min-width: 280px;
      z-index: 10;
      display: none;
    }
    #nav-progress.visible { display: block; }
    .nav-label { font-size: 12px; color: rgba(238,240,244,0.5); font-family: var(--mono); margin-bottom: 7px; }
    .nav-label strong { color: #60a5fa; }
    .nav-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .nav-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); border-radius: 2px; width: 0; transition: width 0.1s linear; }

    /* ── Side panel ── */
    #side-panel {
      width: var(--panel-width);
      background: rgba(8, 10, 16, 0.93) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border-left: 1px solid rgba(255,255,255,0.07) !important;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 20;
    }

    /* ── Panel handle (mobile drag indicator) ── */
    .panel-handle {
      display: none;
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    /* ── Panel header ── */
    #panel-header {
      padding: 24px 24px 0;
      border-bottom: none !important;
    }
    .panel-site {
      font-size: 10px !important;
      font-weight: 600 !important;
      color: rgba(238, 240, 244, 0.48) !important;
      text-transform: uppercase;
      letter-spacing: 0.14em !important;
      margin-bottom: 4px !important;
    }
    .panel-title {
      font-size: 20px !important;
      font-weight: 700 !important;
      color: #eef0f4 !important;
      margin-bottom: 0 !important;
      line-height: 1.2;
    }

    /* ── Point list ── */
    #point-list {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }
    .list-section {
      font-size: 10px !important;
      font-weight: 600 !important;
      color: rgba(238, 240, 244, 0.35) !important;
      text-transform: uppercase;
      letter-spacing: 0.12em !important;
      padding: 10px 6px 6px !important;
    }

    .point-item {
      display: flex !important;
      align-items: center !important;
      gap: 11px !important;
      padding: 12px 14px !important;
      border-radius: 12px !important;
      cursor: pointer;
      margin-bottom: 6px !important;
      background: rgba(255, 255, 255, 0.04) !important;
      transition: background 0.15s, transform 0.15s !important;
      position: relative;
    }
    .point-item:hover {
      background: rgba(255, 255, 255, 0.08) !important;
      transform: translateX(3px);
    }
    .point-item.selected {
      background: rgba(59, 130, 246, 0.12) !important;
    }

    /* Colored left accent bar derived from dot color */
    .point-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 6px;
      bottom: 6px;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
      opacity: 0.5;
    }

    .pt-dot {
      width: 10px !important;
      height: 10px !important;
      border-radius: 50% !important;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    .pt-label {
      font-size: 14px !important;
      font-weight: 500 !important;
      color: #eef0f4 !important;
      flex: 1;
    }
    .pt-sub {
      font-size: 11px !important;
      color: rgba(238, 240, 244, 0.48) !important;
      text-transform: capitalize;
    }

    /* Right arrow indicator */
    .pt-arrow {
      font-size: 18px;
      color: rgba(238, 240, 244, 0.25);
      margin-left: auto;
      flex-shrink: 0;
      transition: color 0.15s;
      line-height: 1;
    }
    .point-item:hover .pt-arrow { color: rgba(238, 240, 244, 0.7); }

    /* ── Detail view ── */
    #point-detail {
      flex: 1;
      overflow-y: auto;
      display: none;
      flex-direction: column;
    }
    #point-detail.visible { display: flex; }

    .back-link {
      display: flex !important;
      align-items: center !important;
      gap: 5px !important;
      padding: 14px 20px 0 !important;
      font-size: 13px !important;
      color: #3b82f6 !important;
      font-weight: 500 !important;
      cursor: pointer;
      border: none !important;
      background: none !important;
    }
    .back-link:hover { opacity: 0.75; }

    .detail-hero {
      padding: 20px 24px 22px !important;
      background: linear-gradient(135deg, rgba(59,130,246,0.12) 0%, rgba(16,185,129,0.06) 100%);
      border-bottom: 1px solid rgba(255,255,255,0.07) !important;
    }

    /* Chip overrides */
    .chip {
      padding: 4px 12px !important;
      border-radius: 20px !important;
      font-size: 10px !important;
      font-weight: 700 !important;
    }
    .chip-dropoff {
      background: rgba(59, 130, 246, 0.18) !important;
      color: #60a5fa !important;
    }
    .chip-collection {
      background: rgba(16, 185, 129, 0.18) !important;
      color: #34d399 !important;
    }
    .chip-both {
      background: rgba(245, 158, 11, 0.18) !important;
      color: #fbbf24 !important;
    }

    .detail-label {
      font-size: 24px !important;
      font-weight: 700 !important;
      color: #eef0f4 !important;
      margin-top: 10px !important;
      line-height: 1.2 !important;
    }
    .detail-notes {
      font-size: 13px !important;
      color: rgba(238, 240, 244, 0.55) !important;
      margin-top: 8px !important;
      line-height: 1.6 !important;
    }

    .detail-section {
      padding: 16px 24px !important;
      border-bottom: 1px solid rgba(255,255,255,0.05) !important;
    }
    .detail-section-title {
      font-size: 10px !important;
      font-weight: 600 !important;
      text-transform: uppercase;
      letter-spacing: 0.12em !important;
      color: #3b82f6 !important;
      margin-bottom: 12px !important;
    }

    .contact-card-3d {
      display: flex !important;
      align-items: flex-start !important;
      gap: 12px !important;
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.07) !important;
      border-radius: 12px !important;
      padding: 14px !important;
      margin-bottom: 8px !important;
    }

    .avatar {
      width: 40px !important;
      height: 40px !important;
      border-radius: 50% !important;
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9) !important;
      color: #fff !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      flex-shrink: 0;
    }

    .contact-name-3d {
      font-size: 14px !important;
      font-weight: 600 !important;
      color: #eef0f4 !important;
    }
    .contact-role-3d {
      font-size: 12px !important;
      color: rgba(238, 240, 244, 0.45) !important;
    }
    .contact-phone-3d {
      display: inline-flex !important;
      align-items: center !important;
      gap: 4px !important;
      margin-top: 6px !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      color: #34d399 !important;
      text-decoration: none !important;
    }
    .contact-phone-3d:hover { color: #6ee7b7 !important; }

    /* ── Nav actions / buttons ── */
    .nav-actions {
      padding: 16px 24px !important;
      flex-shrink: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9) !important;
      border: none !important;
      border-radius: 12px !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      color: #fff !important;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3) !important;
      transition: opacity 0.15s, transform 0.1s !important;
    }
    .btn-primary:hover { opacity: 0.9 !important; }
    .btn-primary:active { transform: scale(0.98) !important; }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #eef0f4 !important;
      border-radius: 12px !important;
      transition: background 0.15s !important;
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1) !important; }

    /* ── Collapse toggle button ── */
    #panel-toggle {
      display: none;
      margin-left: auto;
      background: none;
      border: none;
      color: rgba(238, 240, 244, 0.4);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }
    #panel-toggle:hover { color: rgba(238, 240, 244, 0.8); }

    /* ── Site brand / address overlay ── */
    #site-brand img {
      height: 44px !important;
      opacity: 0.9 !important;
    }
    #site-address {
      color: rgba(255,255,255,0.9) !important;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8) !important;
      -webkit-text-stroke: 0 !important;
      paint-order: unset !important;
    }

    /* ── Splat progress pill ── */
    #splat-progress {
      border-radius: 12px !important;
      background: rgba(8,10,16,0.9) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
    }

    /* ── Mobile / tablet (≤1199px) — bottom sheet ── */
    @media (max-width: 1199px) {
      #app { position: relative; }
      #canvas-wrap { width: 100%; height: 100%; flex: 1; }

      .panel-handle { display: block; }

      #side-panel {
        position: absolute !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        top: auto !important;
        z-index: 30;
        width: 100% !important;
        height: 45vh;
        border-left: none !important;
        border-top: 1px solid rgba(255,255,255,0.1) !important;
        border-bottom: none !important;
        border-radius: 20px 20px 0 0 !important;
        transition: height 0.3s ease;
        overflow: hidden;
        background: rgba(8, 10, 16, 0.96) !important;
      }
      #side-panel.collapsed {
        height: 62px !important;
      }
      #panel-header {
        display: flex !important;
        align-items: center !important;
        padding: 14px 18px 10px !important;
        flex-shrink: 0;
      }
      #panel-header-text { flex: 1; }
      #panel-toggle { display: block; }
      #side-panel.collapsed #panel-toggle { transform: rotate(180deg); }

      #cam-presets {
        top: auto;
        bottom: 16px;
        left: 16px;
        flex-direction: row;
        opacity: 0.8;
      }
      #nav-progress { bottom: 16px; }

      /* Logo + address: top-right, smaller */
      #site-brand {
        right: 16px !important;
        transition: top 0.15s ease;
      }
      #site-brand img { height: 30px !important; }
      #site-address {
        left: auto !important;
        right: 20px !important;
        font-size: 11px !important;
        transition: top 0.15s ease;
      }
    }

    /* ── Small mobile (≤640px) — css.css mobile overrides conflict fix ── */
    @media (max-width: 640px) {
      #app { flex-direction: row !important; }
      #side-panel {
        width: 100% !important;
        height: 45vh !important;
        border-bottom: none !important;
        order: unset !important;
      }
      #side-panel.collapsed { height: 62px !important; }
      #canvas-wrap { flex: 1; min-height: 0; }
      #site-brand, #site-address { display: flex !important; }
    }
  </style>
</head>
<body>
<div id="app">

  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="labels-wrap"></div>

    <div id="loading">
      <div class="load-logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="load-site-name">Landcros</div>
      <div class="load-site-sub">Forrestdale</div>
      <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
      <div class="load-msg" id="load-msg">Initialising…</div>
    </div>

    <!-- Splat background-load progress (shows after loading screen gone) -->
    <div id="splat-progress" style="display:none;position:absolute;bottom:16px;right:16px;
      background:rgba(8,10,16,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);border-radius:12px;
      padding:10px 14px;z-index:10;min-width:200px;flex-direction:column;gap:6px;">
      <div id="splat-msg" style="font:500 11px var(--mono);color:rgba(238,240,244,0.5)"></div>
      <div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">
        <div id="splat-bar" style="height:100%;background:#3b82f6;border-radius:2px;width:0;transition:width 0.2s"></div>
      </div>
    </div>

    <div id="cam-presets"></div>

    <div id="nav-progress">
      <div class="nav-label">Camera: <strong id="nav-pos-label">—</strong></div>
      <div class="nav-bar"><div class="nav-bar-fill" id="nav-bar-fill"></div></div>
    </div>
  </div>

  <div id="site-brand" style="position:fixed;top:16px;right:calc(360px + 16px);z-index:40;pointer-events:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <img id="site-logo" src="" alt="Company logo" style="height:44px;width:auto;opacity:0.9;display:none;">
  </div>
  <div id="site-address" style="position:fixed;top:69px;right:calc(360px + 20px);z-index:40;pointer-events:none;font:500 18px 'Inter','DM Sans',sans-serif;color:rgba(255,255,255,0.9);text-shadow:0 1px 4px rgba(0,0,0,0.8);">107 Allen Rd, Forrestdale</div>

  <aside id="side-panel">
    <div class="panel-handle"></div>

    <div id="panel-header">
      <div id="panel-header-text" style="text-align:left">
        <div class="panel-site" id="panel-site">Site</div>
        <div class="panel-title" id="panel-title" style="margin-top:-2px">Navigator</div>
      </div>
      <button id="panel-toggle" onclick="togglePanel()" aria-label="Collapse panel">&#8963;</button>
    </div>

    <div id="point-list">
      <div class="list-section">Drop-off points</div>
      <div id="list-dropoff"></div>
      <div class="list-section">Collection points</div>
      <div id="list-collection"></div>
    </div>

    <div id="point-detail">
      <div class="back-link" onclick="showPointList()">&#8249; All points</div>
      <div class="detail-hero">
        <div class="chip" id="detail-chip"></div>
        <div class="detail-label" id="detail-label"></div>
        <div class="detail-notes" id="detail-notes"></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Contacts</div>
        <div id="detail-contacts"></div>
      </div>
      <div class="nav-actions">
        <button class="btn-primary" id="btn-nav" onclick="startNav()">
          Show me the way
        </button>
        <button class="btn-secondary" onclick="setCameraPreset('overhead')" style="margin-top:8px">
          Overhead view
        </button>
      </div>
    </div>
  </aside>

</div>

<script>
  const MOBILE_BP = 1199;

  function _positionMobileBrand() {
    if (window.innerWidth > MOBILE_BP) return;
    const brand = document.getElementById('site-brand');
    const addr  = document.getElementById('site-address');
    // Panel is now a bottom sheet — brand always anchors to top of screen
    if (brand) brand.style.top = '16px';
    if (addr)  addr.style.top  = '52px';
  }

  window.togglePanel = function() {
    const panel = document.getElementById('side-panel');
    panel.classList.toggle('collapsed');
    _positionMobileBrand(); // immediate — CSS transition animates it
  };

  // Collapse panel by default on mobile/tablet and position brand
  if (window.innerWidth <= MOBILE_BP) {
    document.getElementById('side-panel').classList.add('collapsed');
  }
  window.addEventListener('load', _positionMobileBrand);
  window.addEventListener('resize', _positionMobileBrand);

  window.addEventListener('error', e => {
    const el = document.getElementById('load-msg');
    if (el && e.message) el.textContent = 'Error: ' + e.message;
  });
  window.addEventListener('unhandledrejection', e => {
    const r = e.reason;
    const el = document.getElementById('load-msg');
    if (el && r) el.textContent = 'Error: ' + (r?.message || (typeof r === 'string' ? r : 'unknown'));
  });
</script>
