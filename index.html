<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteNav Admin 3D</title>
  <script src="coi-serviceworker.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7?external=three"
    }
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <link rel="stylesheet" href="./style.css">
  <style>
    #app { display: flex; width: 100%; height: 100%; background: #0f1117; }

    /* ── Canvas area ── */
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #three-canvas { display: block; width: 100%; height: 100%; }
    #labels-wrap  { position: absolute; inset: 0; pointer-events: none; }

    /* ── Camera preset buttons ── */
    #cam-presets {
      position: absolute; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 6px; z-index: 10;
    }
    .cam-btn {
      background: rgba(15,17,23,0.82); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12); color: #e5e7eb;
      padding: 7px 13px; border-radius: 8px;
      font: 500 12px var(--font); cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .cam-btn:hover  { background: rgba(24,95,165,0.35); border-color: rgba(24,95,165,0.6); }
    .cam-btn.active { background: rgba(24,95,165,0.45); border-color: #185FA5; color: #fff; }

    /* ── Loading screen ── */
    #loading {
      position: absolute; inset: 0; background: #0f1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
      transition: opacity 0.5s;
    }
    #loading.done { opacity: 0; pointer-events: none; }
    .load-logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 20px; }
    .load-logo span { color: #185FA5; }
    .load-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .load-fill { height: 100%; background: #185FA5; border-radius: 2px; width: 0; transition: width 0.3s; }
    .load-msg { font-size: 12px; color: #6b7280; font-family: var(--mono); }

    /* ── Nav progress bar ── */
    #nav-progress {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(15,17,23,0.9); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      padding: 12px 20px; min-width: 280px; z-index: 10; display: none;
    }
    #nav-progress.visible { display: block; }
    .nav-label { font-size: 12px; color: #9ca3af; font-family: var(--mono); margin-bottom: 6px; }
    .nav-label strong { color: #60a5fa; }
    .nav-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .nav-bar-fill { height: 100%; background: linear-gradient(90deg,#185FA5,#1D9E75); border-radius: 2px; width: 0; transition: width 0.1s linear; }

    /* ── Placement hint ── */
    #placement-hint {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(24,95,165,0.9); color: #fff;
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      pointer-events: none; display: none; z-index: 50;
    }

    /* ── Side panel pages ── */
    #side-panel { position: relative; }
    #panel-body { flex: 1; overflow: hidden; position: relative; }
    .panel-page {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      background: var(--surface);
    }
    #list-view  { transform: translateX(0); }
    #list-view.panel-slide-out  { transform: translateX(-100%); }
    #editor-view { transform: translateX(100%); }
    #editor-view.panel-slide-in { transform: translateX(0); }

    /* ── Editor view ── */
    .ev-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .back-btn {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface-secondary); border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: 7px; padding: 5px 10px;
      font: 500 12px var(--font); cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .ev-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ev-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .ev-body .form-group { margin-bottom: 0; }

    /* ── Contact chips ── */
    .contact-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--primary-light); color: var(--primary);
      border: 1px solid var(--primary); border-radius: 20px;
      padding: 3px 8px 3px 6px; font-size: 12px; font-weight: 500; margin: 2px;
    }
    .chip-remove {
      cursor: pointer; font-size: 14px; line-height: 1;
      color: var(--primary); border: none; background: none; padding: 0;
    }

    /* ── QR section ── */
    #qr-canvas-wrap { display: inline-block; margin-bottom: 10px; }

    /* ── Right panel (admin controls) ── */
    #side-panel {
      width: var(--panel-width); background: rgba(255,255,255,0.90);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; z-index: 20;
    }
    #panel-header {
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-site { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .panel-title { font-size: 17px; font-weight: 700; color: var(--text); }

    #admin-controls { padding: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #admin-controls .btn-primary { margin-bottom: 8px; }
    #admin-controls .btn-secondary { margin-bottom: 8px; }

    #point-list { flex: 1; overflow-y: auto; padding: 8px; min-height: 0; }
    .list-section {
      font-size: 10px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.1em; padding: 7px 8px 5px;
    }
    .point-item {
      display: flex; align-items: center; gap: 11px; padding: 10px; border-radius: 10px;
      cursor: pointer; margin-bottom: 2px; transition: background 0.1s;
    }
    .point-item:hover   { background: var(--surface-secondary); }
    .point-item.selected { background: var(--primary-light); }
    .pt-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .pt-label { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Contacts modal ── */
    #modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 500;
      align-items: center; justify-content: center; padding: 16px;
    }
    #modal-backdrop.open { display: flex; }
    #contact-modal {
      background: var(--surface); border-radius: 16px; width: 100%; max-width: 640px;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }
    .modal-header {
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; flex-shrink: 0;
    }
    .modal-title { font-size: 16px; font-weight: 600; flex: 1; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 8px; border: none;
      background: var(--surface-secondary); color: var(--text-secondary);
      font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }

    /* ── Contact table ── */
    .contact-table { width: 100%; border-collapse: collapse; }
    .contact-table th {
      text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-secondary);
      padding: 6px 10px; border-bottom: 1px solid var(--border);
    }
    .contact-table td {
      padding: 9px 10px; font-size: 13px;
      border-bottom: 1px solid rgba(0,0,0,0.05); vertical-align: middle;
    }
    .contact-table tr:last-child td { border-bottom: none; }
    .orphan-badge {
      font-size: 10px; background: #fef3c7; color: var(--amber);
      border-radius: 4px; padding: 1px 5px; margin-left: 4px; font-weight: 600;
    }
  </style>
</head>
<body>
<div id="app">

  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="labels-wrap"></div>

    <div id="loading">
      <div class="load-logo">Site<span>Nav</span> Admin</div>
      <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
      <div class="load-msg" id="load-msg">Initialising…</div>
    </div>

    <div id="splat-progress" style="display:none;position:absolute;bottom:16px;right:16px;
      background:rgba(15,17,23,0.85);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.1);border-radius:10px;
      padding:10px 14px;z-index:10;min-width:200px;flex-direction:column;gap:6px;">
      <div id="splat-msg" style="font:500 11px var(--mono);color:#9ca3af"></div>
      <div style="height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden">
        <div id="splat-bar" style="height:100%;background:#185FA5;border-radius:2px;width:0;transition:width 0.2s"></div>
      </div>
    </div>

    <div id="cam-presets"></div>

    <div id="nav-progress">
      <div class="nav-label">Camera: <strong id="nav-pos-label">—</strong></div>
      <div class="nav-bar"><div class="nav-bar-fill" id="nav-bar-fill"></div></div>
    </div>

    <div id="placement-hint">Click on the 3D scene to place pin — Esc to cancel</div>
  </div>

  <div id="site-brand" style="position:fixed;top:16px;right:calc(340px + 16px);z-index:40;pointer-events:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <img id="site-logo" src="" alt="" style="height:48px;width:auto;opacity:0.8;display:none;">
  </div>
  <div id="site-address" style="position:fixed;top:69px;right:calc(340px + 22px);z-index:40;pointer-events:none;font:500 18px 'DM Sans',sans-serif;color:rgba(255,255,255,0.8);-webkit-text-stroke:2px black;paint-order:stroke fill;"></div>

  <!-- Admin right panel -->
  <aside id="side-panel">
    <div id="panel-header">
      <div class="panel-site">SiteNav Admin</div>
      <div class="panel-title">3D Editor</div>
    </div>
    <div id="panel-body">

      <!-- List view -->
      <div id="list-view" class="panel-page">
        <div id="admin-controls">
          <button class="btn-primary" id="place-btn" onclick="window.togglePlacement()">+ Place new pin</button>
          <button class="btn-secondary" onclick="window.openContactManager()">Contacts DB</button>
          <input class="form-input" id="search-input" type="search" placeholder="Search pins…" oninput="window.filterPins(this.value)">
        </div>
        <div id="point-list"></div>
      </div>

      <!-- Editor view -->
      <div id="editor-view" class="panel-page">
        <div class="ev-header">
          <button class="back-btn" onclick="window.closeEditor()">&#8592; Back</button>
          <span class="ev-title" id="drawer-title">New pin</span>
        </div>
        <div class="ev-body">
          <div id="drawer-body"></div>
          <div id="qr-section" style="display:none">
            <div id="qr-canvas-wrap"></div>
            <button class="btn-secondary" style="width:auto;margin-top:8px" onclick="window._adminDownloadQR()">Download QR PNG</button>
          </div>
        </div>
      </div>

    </div>
  </aside>

</div>

<!-- Contacts modal -->
<div id="modal-backdrop" onclick="window.handleModalBackdrop(event)">
  <div id="contact-modal">
    <div class="modal-header">
      <div class="modal-title">Contacts DB</div>
      <button class="modal-close" onclick="window.closeContactManager()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <input class="form-input" id="contact-search" type="search" placeholder="Search by name, role or phone…" oninput="window.renderContactTable(this.value)" style="margin-bottom:14px">
      <table class="contact-table" id="contact-table">
        <thead>
          <tr><th>Name</th><th>Role</th><th>Phone</th><th>Active</th></tr>
        </thead>
        <tbody id="contact-tbody"></tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" style="width:auto;padding:9px 18px" onclick="window.addNewContact()">+ Add contact</button>
    </div>
  </div>
</div>

<script>
  window.addEventListener('error', e => {
    const el = document.getElementById('load-msg');
    if (el && e.message) el.textContent = 'Error: ' + e.message;
  });
  window.addEventListener('unhandledrejection', e => {
    const r = e.reason;
    const el = document.getElementById('load-msg');
    if (el && r) el.textContent = 'Error: ' + (r?.message || (typeof r === 'string' ? r : 'unknown'));
  });
</script>
<script type="module" src="./viewer3d.js"></script>
<script type="module" src="./admin3d.js"></script>
</body>
</html>
