<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteNav — Drop-off Viewer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="./style.css">
  <style>
    #app { display: flex; flex-direction: column; width: 100%; height: 100%; }

    #map-zone { height: 40vh; flex-shrink: 0; }

    #info-zone {
      flex: 1;
      overflow-y: auto;
      background: var(--surface);
      padding: 20px;
    }

    .type-chip { margin-bottom: 10px; }
    .point-label { font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
    .point-notes { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-secondary);
      border-radius: 12px;
      padding: 13px;
      margin-bottom: 10px;
    }
    .contact-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-name { font-size: 15px; font-weight: 600; }
    .contact-role { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
    .contact-phone-link {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 9px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
    }

    #btn-nav { margin-top: 20px; margin-bottom: 10px; }
    #step-list { font-size: 13px; color: var(--text-secondary); margin-top: 10px; display: none; }
    #step-list li { padding: 3px 0; }

    #error-view {
      display: none;
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }
    #error-view h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  </style>
</head>
<body>
<div id="app">
  <div id="map-zone">
    <div id="map" class="map-container"></div>
  </div>
  <div id="info-zone">
    <div id="point-view">
      <div class="type-chip chip" id="type-chip"></div>
      <div class="point-label" id="point-label"></div>
      <div class="point-notes" id="point-notes"></div>
      <div class="section-title">Site contacts</div>
      <div id="contacts-list"></div>
      <button class="btn-primary" id="btn-nav" onclick="startNav()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8l4-5v3h6v4H6v3z"/></svg>
        Show me the way
      </button>
      <ol id="step-list"></ol>
    </div>
    <div id="error-view">
      <h2>Point not found</h2>
      <p>This link may be invalid or the point may have been removed.</p>
      <p style="margin-top:8px">Contact site administration for assistance.</p>
    </div>
  </div>
</div>
<script type="module" src="./viewer.js"></script>
</body>
</html>
